<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>My Profile</title><link rel="stylesheet" href="assets/css/style.css"></head><body><main style="max-width:720px;margin:40px auto;padding:20px"><div class="card"><h1>👤 My Account Profile</h1><p>View and update your account details. Students/parents should use Student Profile for academic records.</p><div id="profile-box"><span class="pulse">Loading…</span></div><div style="margin-top:16px"><a class="btn btn-outline" href="change-password.html">Change password</a> <a class="btn btn-outline" href="dashboard.html">Dashboard</a></div></div></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="assets/js/config.js"></script><script src="assets/js/app.js"></script><script>async function load(){const sb=window.sb,box=document.getElementById('profile-box');if(!sb){box.innerHTML='Database not configured';return;}const {data:{user}}=await sb.auth.getUser();if(!user){location.href='login.html';return;}const r=await sb.from('profiles').select('*').eq('id',user.id).maybeSingle();const p=r.data||{};box.innerHTML='<div class="form-group"><label>Full name</label><input id="fn" class="form-input" value="'+esc(p.full_name||'')+'"></div><div class="form-group"><label>Email</label><input class="form-input" readonly value="'+esc(user.email||'')+'"></div><div class="form-group"><label>Phone</label><input id="ph" class="form-input" value="'+esc(p.phone||'')+'"></div><p>Role: <b>'+esc(p.role||'')+'</b> · Status: <b>'+esc(p.status||'')+'</b></p><button class="btn btn-primary" onclick="save()">Save profile</button>'; } async function save(){const sb=window.sb;const {data:{user}}=await sb.auth.getUser();const {error}=await sb.from('profiles').update({full_name:document.getElementById('fn').value,phone:document.getElementById('ph').value}).eq('id',user.id);alert(error?error.message:'Profile updated');}load();</script></body></html>
